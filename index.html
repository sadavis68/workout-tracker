// ═══ SYNC CODE SCREEN ═══
function SyncCodeScreen({onCodeSet}){
  const[mode,setMode]=useState(null);const[ic,setIc]=useState("");const[err,setErr]=useState("");
  const createNew=()=>{const c=generateSyncCode();localStorage.setItem(SYNC_CODE_KEY,c);onCodeSet(c)};
  const join=async()=>{const c=ic.trim().toUpperCase();if(!c||c.split("-").length<2){setErr("Enter a valid sync code");return}
    try{const d=await db.collection("trackers").doc(c).get();if(!d.exists){setErr("No tracker found with that code.");return}localStorage.setItem(SYNC_CODE_KEY,c);onCodeSet(c)}catch(e){setErr("Connection error.")}};
  return(<div style={{padding:"2rem 1.5rem",maxWidth:440,margin:"0 auto"}}>
    <div style={{textAlign:"center",marginBottom:"2rem"}}><div style={{fontSize:"3rem"}}>💪</div><h1 style={{fontSize:"1.5rem",color:"#2d5a3d",margin:".5rem 0 .25rem"}}>Workout Tracker</h1><p style={{color:"#999",fontSize:".88rem"}}>Syncs across all your devices</p></div>
    {mode===null&&<div style={{display:"flex",flexDirection:"column",gap:".75rem"}}>
      <button onClick={createNew} style={{padding:"1.1rem",border:"none",borderRadius:"12px",background:"#2d5a3d",color:"#fff",fontSize:"1rem",fontWeight:700,cursor:"pointer"}}>Start Fresh</button>
      <button onClick={()=>setMode("existing")} style={{padding:"1.1rem",border:"2px solid #2d5a3d",borderRadius:"12px",background:"#fff",color:"#2d5a3d",fontSize:"1rem",fontWeight:700,cursor:"pointer"}}>I Have a Sync Code</button></div>}
    {mode==="existing"&&<div style={{background:"#fff",borderRadius:"12px",padding:"1.25rem",boxShadow:"0 2px 12px rgba(0,0,0,.06)"}}>
      <div style={{fontWeight:700,marginBottom:".75rem"}}>Enter your sync code</div>
      <input type="text" value={ic} onChange={e=>{setIc(e.target.value.toUpperCase());setErr("")}} placeholder="IRON-WOLF-4821" style={{...IS,fontSize:"1.1rem",textAlign:"center",letterSpacing:".05em",padding:".7rem",textTransform:"uppercase"}} autoFocus autoCapitalize="characters" autoCorrect="off"/>
      {err&&<div style={{color:"#c0392b",fontSize:".82rem",marginTop:".5rem"}}>{err}</div>}
      <div style={{display:"flex",gap:".5rem",marginTop:"1rem"}}>
        <button onClick={()=>setMode(null)} style={{flex:1,padding:".7rem",border:"1px solid #ddd",borderRadius:"8px",background:"#fff",cursor:"pointer",fontWeight:600,fontSize:".9rem"}}>Back</button>
        <button onClick={join} style={{flex:2,padding:".7rem",border:"none",borderRadius:"8px",background:"#2d5a3d",color:"#fff",cursor:"pointer",fontWeight:600,fontSize:".9rem"}}>Connect</button></div></div>}
  </div>);
}

// ═══ MAIN APP ═══
function App(){
  const[syncCode,setSyncCode]=useState(()=>localStorage.getItem(SYNC_CODE_KEY));
  const[page,setPage]=useState("tracker");
  const[routine,setRoutine]=useState(()=>localStorage.getItem("workout-routine")||"sc");
  const changeRoutine=(r)=>{setRoutine(r);localStorage.setItem("workout-routine",r)};
  if(!syncCode)return<SyncCodeScreen onCodeSet={setSyncCode}/>;
  const R=ROUTINES[routine];const themeColor=R.color;
  return(<div style={{paddingBottom:"4rem"}}>
    {page==="tracker"?<Tracker syncCode={syncCode} setSyncCode={setSyncCode} routine={routine} setRoutine={changeRoutine}/>:
     page==="plan"?<PlanView routine={routine}/>:
     page==="progress"?<ProgressView syncCode={syncCode} routine={routine}/>:
     <RoutinePicker routine={routine} setRoutine={changeRoutine} setPage={setPage}/>}
    <div className="bottom-tabs">
      <button className={page==="tracker"?"active":""} onClick={()=>setPage("tracker")}><span className="tab-icon">📝</span>Tracker</button>
      <button className={page==="progress"?"active":""} onClick={()=>setPage("progress")}><span className="tab-icon">📈</span>Progress</button>
      <button className={page==="plan"?"active":""} onClick={()=>setPage("plan")}><span className="tab-icon">📋</span>Exercises</button>
      <button className={page==="routines"?"active":""} onClick={()=>setPage("routines")}><span className="tab-icon">🔄</span>Routines</button>
    </div></div>);
}

// ═══ ROUTINE PICKER ═══

  return(<div>

      <div style={{fontSize:"1.35rem",fontWeight:700}}>Choose Routine</div></div>
    <div style={{padding:"1rem"}}>
      {Object.entries(ROUTINES).map(([key,r])=>(
        <button key={key} onClick={()=>{setRoutine(key);setPage("tracker")}} style={{
          width:"100%",padding:"1.25rem",marginBottom:".75rem",border:routine===key?`3px solid ${r.color}`:"2px solid #e0dbd5",
          borderRadius:"14px",background:"#fff",cursor:"pointer",textAlign:"left",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:".6rem",marginBottom:".3rem"}}>
            <span style={{fontSize:"1.5rem"}}>{r.icon}</span>
            <span style={{fontSize:"1.1rem",fontWeight:700,color:r.color}}>{r.name}</span>
            {routine===key&&<span style={{fontSize:".7rem",background:r.color,color:"#fff",padding:".15rem .5rem",borderRadius:"10px",fontWeight:600,marginLeft:"auto"}}>ACTIVE</span>}
          </div>
          <div style={{fontSize:".85rem",color:"#777"}}>{r.desc}</div>
        </button>))}
      <div style={{textAlign:"center",color:"#999",fontSize:".82rem",padding:"1rem",lineHeight:1.6}}>
        Each routine tracks progress independently. Switching routines won't erase your data — you can go back anytime.
      </div>
    </div></div>);

// ═══ TRACKER ═══
function Tracker({syncCode,setSyncCode,routine,setRoutine}){
  const R=ROUTINES[routine];const dayKeys=Object.keys(R.days);
  const[data,setData]=useState({startDate:new Date().toISOString().split("T")[0],routines:{}});
  const[currentWeek,setCurrentWeek]=useState(1);
  const[activeDay,setActiveDay]=useState(dayKeys[0]);
  const[view,setView]=useState("log");
  const[synced,setSynced]=useState(false);
  const[showSync,setShowSync]=useState(false);
  const saveTimeout=useRef(null);
  const isEditing=useRef(false);
  const editTimer=useRef(null);
  const latestData=useRef(data);

  useEffect(()=>{setActiveDay(dayKeys[0])},[routine]);

  useEffect(()=>{
    if(!syncCode)return;
    const unsub=db.collection("trackers").doc(syncCode).onSnapshot(doc=>{
      if(isEditing.current){setSynced(true);return}
      if(doc.exists){const r=doc.data();latestData.current=r;setData(r);
        if(r.startDate){const s=new Date(r.startDate),n=new Date(),d=Math.floor((n-s)/(7*24*60*60*1000));setCurrentWeek(Math.max(1,d+1))}
        setSynced(true)}else{
        const init={startDate:new Date().toISOString().split("T")[0],routines:{}};
        db.collection("trackers").doc(syncCode).set(init);latestData.current=init;setData(init);setSynced(true)}
    },()=>setSynced(false));
    return()=>unsub();
  },[syncCode]);

  const save=useCallback(nd=>{
    isEditing.current=true;
    if(editTimer.current)clearTimeout(editTimer.current);
    editTimer.current=setTimeout(()=>{isEditing.current=false},5000);
    latestData.current=nd;setData(nd);
    try{localStorage.setItem(LOCAL_DATA_KEY,JSON.stringify(nd))}catch{}
    if(saveTimeout.current)clearTimeout(saveTimeout.current);
    saveTimeout.current=setTimeout(()=>{
      db.collection("trackers").doc(syncCode).set(nd).then(()=>{
        setTimeout(()=>{isEditing.current=false},1000);
      }).catch(()=>{})},1500)},[syncCode]);

  const rData=data?.routines?.[routine]||{};
  const getDayDate=(w,d)=>rData?.weeks?.[`w${w}`]?.[d]?._date||"";
  const setDayDate=v=>{const nd=JSON.parse(JSON.stringify(latestData.current));const wk=`w${currentWeek}`;
    if(!nd.routines)nd.routines={};if(!nd.routines[routine])nd.routines[routine]={weeks:{}};if(!nd.routines[routine].weeks[wk])nd.routines[routine].weeks[wk]={};
    if(!nd.routines[routine].weeks[wk][activeDay])nd.routines[routine].weeks[wk][activeDay]={};
    nd.routines[routine].weeks[wk][activeDay]._date=v;save(nd)};
  const getEntry=(w,d,exId)=>rData?.weeks?.[`w${w}`]?.[d]?.[exId]||{};
  const updateEntry=(exId,field,value,exDef)=>{const nd=JSON.parse(JSON.stringify(latestData.current));const wk=`w${currentWeek}`;
    if(!nd.routines)nd.routines={};if(!nd.routines[routine])nd.routines[routine]={weeks:{}};if(!nd.routines[routine].weeks[wk])nd.routines[routine].weeks[wk]={};
    if(!nd.routines[routine].weeks[wk][activeDay])nd.routines[routine].weeks[wk][activeDay]={};
    if(!nd.routines[routine].weeks[wk][activeDay][exId])nd.routines[routine].weeks[wk][activeDay][exId]={};
    nd.routines[routine].weeks[wk][activeDay][exId][field]=value;
    if(exDef){if(!nd.routines[routine].exerciseLib)nd.routines[routine].exerciseLib={};
      nd.routines[routine].exerciseLib[exId]={name:exDef.name,target:exDef.target,unit:exDef.unit||"reps",hasWeight:!!exDef.hasWeight,note:exDef.note||"",day:activeDay}}
    save(nd)};
  const archiveExercise=(exId)=>{const nd=JSON.parse(JSON.stringify(latestData.current));
    if(!nd.routines?.[routine]?.restored)return;
    const dayKey=Object.keys(R.days).find(dk=>(nd.routines[routine].restored[dk]||[]).includes(exId));
    if(dayKey){nd.routines[routine].restored[dayKey]=nd.routines[routine].restored[dayKey].filter(id=>id!==exId);save(nd)}};
  const getActiveExercises=(dayKey)=>{
    const hardcoded=R.days[dayKey].exercises;
    const restored=rData?.restored?.[dayKey]||[];
    const lib=rData?.exerciseLib||{};
    const restoredExs=restored.filter(id=>lib[id]&&!hardcoded.some(ex=>ex.id===id)).map(id=>({id,...lib[id],isRestored:true}));
    return[...hardcoded,...restoredExs]};
  const isDayComplete=(w,d)=>{const dd=rData?.weeks?.[`w${w}`]?.[d];if(!dd)return false;return R.days[d].exercises.every(ex=>dd[ex.id]?.done)};
  const getWC=w=>dayKeys.filter(d=>isDayComplete(w,d)).length;
  const resetData=()=>{if(confirm("Erase ALL progress for this routine? Exercise library will be preserved.")){const nd=JSON.parse(JSON.stringify(latestData.current));if(!nd.routines)nd.routines={};const lib=nd.routines[routine]?.exerciseLib||{};nd.routines[routine]={weeks:{},exerciseLib:lib,restored:{}};save(nd);setCurrentWeek(1)}};
  const disconnect=()=>{if(confirm("Disconnect this device?")){localStorage.removeItem(SYNC_CODE_KEY);localStorage.removeItem(LOCAL_DATA_KEY);setSyncCode(null)}};

  const plan=R.days[activeDay];const activeExercises=getActiveExercises(activeDay);const cw=getWC(currentWeek);const isMSTF=routine==="mstf";
  const pastWeeks=[];for(let w=currentWeek-1;w>=1;w--){if(rData?.weeks?.[`w${w}`])pastWeeks.push(w)}

  return(<div>
    <div style={{background:R.color,color:"#fff",padding:"1.25rem 1rem 1rem",textAlign:"center"}}>
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:".5rem"}}>
        <span style={{fontSize:"1.35rem",fontWeight:700}}>{R.short} Tracker</span>
        <span className={`sync-badge ${synced?"online":"offline"}`}><span style={{width:6,height:6,borderRadius:"50%",background:synced?"#2e7d32":"#e65100",animation:synced?"none":"pulse 1.5s infinite"}}></span>{synced?"synced":"offline"}</span></div>
      <div style={{fontSize:".82rem",opacity:.8,marginTop:".2rem"}}>Week {currentWeek} • {cw}/{dayKeys.length} sessions
        <span onClick={()=>setShowSync(!showSync)} style={{marginLeft:8,cursor:"pointer",textDecoration:"underline",opacity:.7}}>sync code</span></div></div>

    {showSync&&<div style={{background:"#fff",padding:"1rem",borderBottom:"1px solid #e0dbd5",textAlign:"center"}}>
      <div style={{fontSize:".78rem",color:"#999",marginBottom:".3rem"}}>Your sync code:</div>
      <div style={{fontSize:"1.3rem",fontWeight:700,letterSpacing:".08em",color:R.color,fontFamily:"monospace"}}>{syncCode}</div>
      <button onClick={disconnect} style={{marginTop:".6rem",border:"1px solid #ddd",background:"none",color:"#999",padding:".3rem 1rem",borderRadius:"6px",fontSize:".75rem",cursor:"pointer"}}>Disconnect device</button></div>}

    <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"1rem",padding:".75rem 1rem",background:"#fff",borderBottom:"1px solid #e0dbd5"}}>
      <button onClick={()=>setCurrentWeek(Math.max(1,currentWeek-1))} disabled={currentWeek<=1} style={{border:"none",background:"none",fontSize:"1.2rem",cursor:currentWeek>1?"pointer":"default",opacity:currentWeek>1?1:.3,padding:".25rem .5rem"}}>◀</button>
      <span style={{fontWeight:600,fontSize:".95rem"}}>Week {currentWeek}</span>
      <button onClick={()=>setCurrentWeek(currentWeek+1)} style={{border:"none",background:"none",fontSize:"1.2rem",cursor:"pointer",padding:".25rem .5rem"}}>▶</button></div>

    <div style={{display:"flex",gap:".5rem",padding:".75rem 1rem"}}>
      {["log","history"].map(v=><button key={v} onClick={()=>setView(v)} style={{flex:1,padding:".5rem",border:"none",borderRadius:"8px",fontWeight:600,fontSize:".85rem",cursor:"pointer",background:view===v?R.color:"#fff",color:view===v?"#fff":R.color,boxShadow:view===v?"none":"0 1px 4px rgba(0,0,0,.08)"}}>{v==="log"?"📝 Log":"📊 History"}</button>)}</div>

    {view==="log"?<>
      <div style={{display:"flex",gap:".4rem",padding:"0 1rem .75rem"}}>
        {dayKeys.map(key=>{const day=R.days[key];const comp=isDayComplete(currentWeek,key);const dd=getDayDate(currentWeek,key);
          return(<button key={key} onClick={()=>setActiveDay(key)} style={{flex:1,padding:".6rem .25rem",border:activeDay===key?`2px solid ${day.color}`:"2px solid transparent",borderRadius:"10px",cursor:"pointer",fontSize:".75rem",fontWeight:600,textAlign:"center",background:activeDay===key?day.bg:"#fff",color:day.color,boxShadow:"0 1px 4px rgba(0,0,0,.06)",position:"relative"}}>
            {comp&&<span style={{position:"absolute",top:3,right:6,fontSize:".7rem"}}>✅</span>}
            <div>{day.label}</div><div style={{fontSize:".65rem",fontWeight:400,opacity:.75,marginTop:1}}>{day.title}</div>
            {dd&&<div style={{fontSize:".6rem",fontWeight:400,opacity:.55,marginTop:1}}>{new Date(dd+"T12:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"})}</div>}
          </button>)})}
      </div>

      <div style={{padding:"0 1rem .75rem"}}><div style={{background:"#fff",borderRadius:"10px",padding:".65rem 1rem",boxShadow:"0 1px 4px rgba(0,0,0,.06)",display:"flex",alignItems:"center",gap:".6rem"}}>
        <span style={{fontSize:".82rem",fontWeight:600,color:"#666",whiteSpace:"nowrap"}}>📅 Date:</span>
        <input type="date" value={getDayDate(currentWeek,activeDay)||new Date().toISOString().split("T")[0]} onChange={e=>setDayDate(e.target.value)} style={{flex:1,padding:".4rem .5rem",border:"1.5px solid #e0dbd5",borderRadius:"8px",fontSize:".9rem",fontFamily:"inherit",background:"#fafaf8",outline:"none"}}/></div></div>

      {isMSTF&&<div style={{margin:"0 1rem .75rem",padding:".6rem .85rem",background:"#f0ecf5",borderRadius:"8px",fontSize:".78rem",color:"#5b3a8c",lineHeight:1.5}}>
        <strong>MSTF tempo:</strong> 10 sec up, 10 sec down. 1 set to failure. Target 90–120 sec TUL per exercise. Under 90s → go lighter. Over 120s → go heavier. Use bands, dumbbells, or bodyweight.</div>}

      <div style={{padding:"0 1rem"}}>
        {activeExercises.map(ex=>{const entry=getEntry(currentWeek,activeDay,ex.id);
          return(<div key={ex.id} style={{background:"#fff",borderRadius:"12px",padding:".9rem 1rem",marginBottom:".65rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)",borderLeft:`4px solid ${entry.done?"#4caf50":ex.isRestored?"#e67e22":plan.color}`,opacity:entry.done?0.85:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:".5rem"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                  <span style={{fontWeight:700,fontSize:".95rem"}}>{ex.name}</span>
                  {ex.isRestored&&<span style={{fontSize:".6rem",background:"#fdf3ec",color:"#e67e22",padding:".1rem .4rem",borderRadius:"8px",fontWeight:600}}>RESTORED</span>}
                </div>
                <div style={{fontSize:".78rem",color:"#888",marginTop:1}}>{ex.target}</div>
              </div>
              <div style={{display:"flex",gap:".3rem",alignItems:"center"}}>
                {ex.isRestored&&<button onClick={()=>archiveExercise(ex.id)} title="Archive" style={{border:"1px solid #ddd",background:"#fff",borderRadius:"6px",width:28,height:28,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:".7rem",color:"#999"}}>✕</button>}
                <button onClick={()=>updateEntry(ex.id,"done",!entry.done,ex)} style={{border:`2px solid ${entry.done?"#4caf50":"#ccc"}`,background:entry.done?"#4caf50":"#fff",borderRadius:"8px",width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",color:entry.done?"#fff":"#ccc",flexShrink:0}}>✓</button>
              </div>
            </div>
            <div style={{display:"flex",gap:".4rem",flexWrap:"wrap"}}>
              {!isMSTF&&<div style={{flex:1,minWidth:"60px"}}><label style={{fontSize:".68rem",color:"#999",fontWeight:600,textTransform:"uppercase"}}>Sets</label>
                <input type="number" inputMode="numeric" value={entry.sets||""} onChange={e=>updateEntry(ex.id,"sets",e.target.value,ex)} placeholder="—" style={IS}/></div>}
              <div style={{flex:1,minWidth:"60px"}}>
                <label style={{fontSize:".68rem",color:"#999",fontWeight:600,textTransform:"uppercase"}}>{isMSTF?"TUL (sec)":ex.unit==="sec"?"Seconds":ex.unit==="min"?"Minutes":ex.unit==="rounds"?"Rounds":"Reps"}</label>
                <input type="number" inputMode="numeric" value={entry.reps||""} onChange={e=>updateEntry(ex.id,"reps",e.target.value,ex)} placeholder={isMSTF?"90–120":"—"} style={{...IS,borderColor:isMSTF&&entry.reps?(Number(entry.reps)<90?"#e67e22":Number(entry.reps)<=120?"#4caf50":"#3498db"):"#e0dbd5"}}/>
                {isMSTF&&entry.reps&&<div style={{fontSize:".68rem",fontWeight:600,marginTop:".2rem",color:Number(entry.reps)<90?"#e67e22":Number(entry.reps)<=120?"#27ae60":"#2980b9"}}>
                  {Number(entry.reps)<90?"⬆ Too heavy — reduce resistance":Number(entry.reps)<=120?"✓ Sweet spot":"⬇ Too light — increase resistance"}</div>}
              </div>
              {ex.hasWeight&&<div style={{flex:1,minWidth:"60px"}}><label style={{fontSize:".68rem",color:"#999",fontWeight:600,textTransform:"uppercase"}}>Lbs</label>
                <input type="number" inputMode="decimal" value={entry.weight||""} onChange={e=>updateEntry(ex.id,"weight",e.target.value,ex)} placeholder="—" style={IS}/></div>}
            </div>
            <div style={{marginTop:".4rem"}}><label style={{fontSize:".68rem",color:"#999",fontWeight:600,textTransform:"uppercase"}}>Notes</label>
              <input type="text" value={entry.notes||""} onChange={e=>updateEntry(ex.id,"notes",e.target.value,ex)} placeholder={isMSTF?"Reached failure? Band/DB/BW? Weight?":"How did it feel?"} style={{...IS,fontSize:".82rem"}}/></div>
          </div>)})}
      </div>
    </>:
    <div style={{padding:"0 1rem"}}>
      <WS week={currentWeek} rData={rData} label="This Week" R={R} routine={routine}/>
      {pastWeeks.length>0?pastWeeks.map(w=><WS key={w} week={w} rData={rData} label={`Week ${w}`} R={R} routine={routine}/>):
        <div style={{textAlign:"center",color:"#999",padding:"2rem 1rem",fontSize:".9rem"}}>Past weeks appear here as you progress.</div>}
      <button onClick={resetData} style={{display:"block",margin:"2rem auto 0",background:"none",border:"1px solid #ddd",color:"#c0392b",padding:".6rem 1.5rem",borderRadius:"8px",fontSize:".82rem",cursor:"pointer"}}>Reset {R.short} Progress</button>
    </div>}
  </div>);
}

// ═══ WEEK SUMMARY ═══
function WS({week,rData,label,R,routine}){
  const wk=`w${week}`;const wd=rData?.weeks?.[wk];const dayKeys=Object.keys(R.days);const isMSTF=routine==="mstf";
  if(!wd&&label!=="This Week")return null;
  return(<div style={{background:"#fff",borderRadius:"12px",padding:"1rem",marginBottom:".75rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
    <div style={{fontWeight:700,fontSize:"1rem",marginBottom:".6rem",color:R.color}}>{label}</div>
    {dayKeys.map(dk=>{const day=R.days[dk];const dd=wd?.[dk];const exs=day.exercises;const logged=exs.filter(ex=>dd?.[ex.id]?.done).length;const total=exs.length;
      return(<div key={dk} style={{marginBottom:".6rem",paddingBottom:".6rem",borderBottom:"1px solid #f0ece7"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".3rem"}}>
          <div><span style={{fontWeight:600,fontSize:".88rem",color:day.color}}>{day.label}: {day.title}</span>
            {dd?._date&&<span style={{fontSize:".72rem",color:"#aaa",marginLeft:".4rem"}}>{new Date(dd._date+"T12:00:00").toLocaleDateString(undefined,{month:"short",day:"numeric"})}</span>}</div>
          <span style={{fontSize:".78rem",color:logged===total?"#4caf50":"#999"}}>{logged}/{total}{logged===total?" ✅":""}</span></div>
        {dd&&<div style={{fontSize:".78rem",color:"#777"}}>{exs.map(ex=>{const e=dd[ex.id];if(!e?.done)return null;
          const tulColor=isMSTF&&e.reps?(Number(e.reps)<90?"#e67e22":Number(e.reps)<=120?"#27ae60":"#2980b9"):null;
          return(<div key={ex.id} style={{marginLeft:".5rem",marginBottom:".15rem"}}><span style={{fontWeight:500}}>{ex.name}:</span>{" "}
            {!isMSTF&&e.sets&&`${e.sets}×`}{e.reps?(isMSTF?<span style={{color:tulColor,fontWeight:600}}>{e.reps}s</span>:e.reps):"—"}{e.weight?` @ ${e.weight}lb`:""}
            {e.notes&&<span style={{color:"#aaa"}}> — {e.notes}</span>}</div>)})}</div>}
        {!dd&&<div style={{fontSize:".78rem",color:"#ccc",marginLeft:".5rem"}}>Not logged</div>}
      </div>)})}</div>);
}

// ═══ MINI CHART (SVG) ═══
function MiniChart({points,targetMin,targetMax,color,label,unit}){
  if(!points||points.length===0)return<div style={{color:"#ccc",fontSize:".82rem",padding:".5rem 0"}}>No data yet</div>;
  const W=300,H=120,PX=35,PY=15,PB=25;
  const vals=points.map(p=>p.value);const weeks=points.map(p=>p.week);
  let minV=Math.min(...vals),maxV=Math.max(...vals);
  if(targetMin!==undefined){minV=Math.min(minV,targetMin);maxV=Math.max(maxV,targetMax)}
  if(minV===maxV){minV-=10;maxV+=10}
  const range=maxV-minV||1;
  const x=i=>PX+(i/(Math.max(points.length-1,1)))*(W-PX-10);
  const y=v=>PY+(1-(v-minV)/range)*(H-PY-PB);
  const pathD=points.map((p,i)=>`${i===0?"M":"L"}${x(i).toFixed(1)},${y(p.value).toFixed(1)}`).join(" ");

  return(<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:340,height:"auto",display:"block"}}>
    {targetMin!==undefined&&<rect x={PX} y={y(targetMax)} width={W-PX-10} height={y(targetMin)-y(targetMax)} fill="#27ae60" opacity=".1" rx="3"/>}
    {targetMin!==undefined&&<text x={W-12} y={y(targetMax)+12} fontSize="8" fill="#27ae60" textAnchor="end" opacity=".6">{targetMax}s</text>}
    {targetMin!==undefined&&<text x={W-12} y={y(targetMin)-4} fontSize="8" fill="#27ae60" textAnchor="end" opacity=".6">{targetMin}s</text>}
    {[0,0.25,0.5,0.75,1].map((f,i)=>{const v=Math.round(minV+f*range);
      return<g key={i}><line x1={PX} y1={y(v)} x2={W-10} y2={y(v)} stroke="#eee" strokeWidth=".5"/>
        <text x={PX-4} y={y(v)+3} fontSize="8" fill="#999" textAnchor="end">{v}</text></g>})}
    <path d={pathD} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
    {points.map((p,i)=><g key={i}>
      <circle cx={x(i)} cy={y(p.value)} r="4" fill="#fff" stroke={color} strokeWidth="2"/>
      <text x={x(i)} y={y(p.value)-8} fontSize="8" fill={color} textAnchor="middle" fontWeight="600">{p.value}</text>
      <text x={x(i)} y={H-4} fontSize="7" fill="#999" textAnchor="middle">W{p.week}</text>
    </g>)}
  </svg>);
}

// ═══ PROGRESS VIEW ═══
function ProgressView({syncCode,routine}){
  const R=ROUTINES[routine];const dayKeys=Object.keys(R.days);const isMSTF=routine==="mstf";
  const[data,setData]=useState(null);
  const[activeDay,setActiveDay]=useState(dayKeys[0]);
  const[loading,setLoading]=useState(true);

  useEffect(()=>{setActiveDay(dayKeys[0])},[routine]);

  useEffect(()=>{
    if(!syncCode)return;
    const unsub=db.collection("trackers").doc(syncCode).onSnapshot(doc=>{
      if(doc.exists)setData(doc.data());
      setLoading(false);
    },()=>setLoading(false));
    return()=>unsub();
  },[syncCode]);

  const getExerciseHistory=(exId)=>{
    const rData=data?.routines?.[routine];if(!rData?.weeks)return[];
    const points=[];
    const weekKeys=Object.keys(rData.weeks).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
    weekKeys.forEach(wk=>{
      const weekNum=parseInt(wk.slice(1));
      const dayData=rData.weeks[wk]?.[activeDay];
      const entry=dayData?.[exId];
      if(entry?.done&&entry?.reps){points.push({week:weekNum,value:Number(entry.reps),weight:entry.weight?Number(entry.weight):null})}
    });
    return points;
  };

  const getWeightHistory=(exId)=>{
    const rData=data?.routines?.[routine];if(!rData?.weeks)return[];
    const points=[];
    const weekKeys=Object.keys(rData.weeks).sort((a,b)=>parseInt(a.slice(1))-parseInt(b.slice(1)));
    weekKeys.forEach(wk=>{
      const weekNum=parseInt(wk.slice(1));
      const entry=rData.weeks[wk]?.[activeDay]?.[exId];
      if(entry?.done&&entry?.weight){points.push({week:weekNum,value:Number(entry.weight)})}
    });
    return points;
  };

  const plan=R.days[activeDay];
  const rData=data?.routines?.[routine]||{};
  const lib=rData?.exerciseLib||{};
  const restored=rData?.restored?.[activeDay]||[];
  const activeIds=[...plan.exercises.map(ex=>ex.id),...restored];
  const hasAnyData=plan.exercises.some(ex=>getExerciseHistory(ex.id).length>0);

  // Find archived exercises: in exerciseLib for this day, have data, but not active
  const archivedExs=Object.entries(lib).filter(([id,meta])=>meta.day===activeDay&&!activeIds.includes(id)&&getExerciseHistory(id).length>0);

  const restoreExercise=(exId)=>{
    const nd=JSON.parse(JSON.stringify(data));
    if(!nd.routines[routine].restored)nd.routines[routine].restored={};
    if(!nd.routines[routine].restored[activeDay])nd.routines[routine].restored[activeDay]=[];
    if(!nd.routines[routine].restored[activeDay].includes(exId)){
      nd.routines[routine].restored[activeDay].push(exId);
      db.collection("trackers").doc(syncCode).set(nd);setData(nd)}};

  return(<div>
    <div style={{background:R.color,color:"#fff",padding:"1.25rem 1rem",textAlign:"center"}}>
      <div style={{fontSize:"1.35rem",fontWeight:700}}>Progress</div>
      <div style={{fontSize:".82rem",opacity:.8,marginTop:".2rem"}}>{R.name} — trends over time</div></div>

    <div style={{display:"flex",gap:".4rem",padding:".75rem 1rem"}}>
      {dayKeys.map(key=>{const day=R.days[key];
        return(<button key={key} onClick={()=>setActiveDay(key)} style={{
          flex:1,padding:".5rem .25rem",border:activeDay===key?`2px solid ${day.color}`:"2px solid transparent",
          borderRadius:"10px",cursor:"pointer",fontSize:".75rem",fontWeight:600,textAlign:"center",
          background:activeDay===key?day.bg:"#fff",color:day.color,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div>{day.label}</div><div style={{fontSize:".65rem",fontWeight:400,opacity:.75,marginTop:1}}>{day.title}</div>
        </button>)})}
    </div>

    {loading?<div style={{textAlign:"center",padding:"3rem",color:"#999"}}>Loading...</div>:
     !hasAnyData&&archivedExs.length===0?<div style={{textAlign:"center",padding:"3rem 1.5rem",color:"#999",fontSize:".9rem",lineHeight:1.6}}>
       No completed workouts logged yet for {plan.label}. After you log a few weeks, charts will appear here showing your trends.</div>:
    <div style={{padding:"0 1rem"}}>
      {plan.exercises.map(ex=>{
        const history=getExerciseHistory(ex.id);
        const weightHistory=getWeightHistory(ex.id);
        if(history.length===0)return null;
        const trend=history.length>=2?history[history.length-1].value-history[history.length-2].value:0;
        return(<div key={ex.id} style={{background:"#fff",borderRadius:"12px",padding:"1rem",marginBottom:".75rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".5rem"}}>
            <div style={{fontWeight:700,fontSize:".95rem"}}>{ex.name}</div>
            {trend!==0&&<span style={{fontSize:".75rem",fontWeight:600,color:trend>0?"#27ae60":"#e67e22"}}>
              {trend>0?"▲":"▼"} {Math.abs(trend)}{isMSTF?"s":""}</span>}
          </div>
          <div style={{fontSize:".72rem",color:"#999",marginBottom:".3rem",fontWeight:600,textTransform:"uppercase"}}>
            {isMSTF?"Time Under Load (sec)":ex.unit==="sec"?"Duration (sec)":"Reps"}</div>
          <MiniChart points={history} color={R.color} targetMin={isMSTF?90:undefined} targetMax={isMSTF?120:undefined}/>
          {weightHistory.length>0&&<>
            <div style={{fontSize:".72rem",color:"#999",marginTop:".75rem",marginBottom:".3rem",fontWeight:600,textTransform:"uppercase"}}>Weight (lbs)</div>
            <MiniChart points={weightHistory} color="#c4713b"/></>}
        </div>)})}

      {/* Archived Exercises */}
      {archivedExs.length>0&&<>
        <div style={{fontSize:".8rem",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",color:"#999",padding:".75rem 0 .5rem",marginTop:".5rem",borderTop:"2px dashed #e0dbd5"}}>
          📦 Archived Exercises</div>
        <div style={{fontSize:".78rem",color:"#999",marginBottom:".75rem",lineHeight:1.5}}>
          These exercises were removed from the active routine but your data is preserved. Tap Restore to add them back to your workout.</div>
        {archivedExs.map(([id,meta])=>{
          const history=getExerciseHistory(id);
          const weightHistory=getWeightHistory(id);
          const trend=history.length>=2?history[history.length-1].value-history[history.length-2].value:0;
          return(<div key={id} style={{background:"#fff",borderRadius:"12px",padding:"1rem",marginBottom:".75rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)",border:"1px dashed #e0dbd5"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".5rem"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:".4rem"}}>
                  <span style={{fontWeight:700,fontSize:".95rem"}}>{meta.name}</span>
                  <span style={{fontSize:".6rem",background:"#f5f0eb",color:"#999",padding:".1rem .4rem",borderRadius:"8px",fontWeight:600}}>ARCHIVED</span>
                </div>
                {trend!==0&&<span style={{fontSize:".72rem",fontWeight:600,color:trend>0?"#27ae60":"#e67e22"}}>
                  Last change: {trend>0?"▲":"▼"} {Math.abs(trend)}{isMSTF?"s":""}</span>}
              </div>
              <button onClick={()=>restoreExercise(id)} style={{border:"none",background:R.color,color:"#fff",padding:".4rem .8rem",borderRadius:"8px",fontSize:".75rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>Restore</button>
            </div>
            <div style={{fontSize:".72rem",color:"#999",marginBottom:".3rem",fontWeight:600,textTransform:"uppercase"}}>
              {isMSTF?"Time Under Load (sec)":meta.unit==="sec"?"Duration (sec)":"Reps"}</div>
            <MiniChart points={history} color="#999" targetMin={isMSTF?90:undefined} targetMax={isMSTF?120:undefined}/>
            {weightHistory.length>0&&<>
              <div style={{fontSize:".72rem",color:"#999",marginTop:".75rem",marginBottom:".3rem",fontWeight:600,textTransform:"uppercase"}}>Weight (lbs)</div>
              <MiniChart points={weightHistory} color="#c4a882"/></>}
          </div>)})}
      </>}
    </div>}
  </div>);
}

// ═══ EXERCISE PLAN VIEW ═══
function PlanView({routine}){
  const R=ROUTINES[routine];const[openDay,setOpenDay]=useState(null);const isMSTF=routine==="mstf";
  return(<div>
    <div style={{background:R.color,color:"#fff",padding:"1.25rem 1rem",textAlign:"center"}}>
      <div style={{fontSize:"1.35rem",fontWeight:700}}>{R.short} Exercise Guide</div>
      <div style={{fontSize:".82rem",opacity:.8,marginTop:".2rem"}}>Tap a day for full instructions</div></div>
    <div style={{margin:"1rem",padding:".85rem 1rem",background:isMSTF?"#f0ecf5":"#fdf3ec",borderRadius:"10px",fontSize:".82rem",lineHeight:1.55}}>
      {isMSTF?<><strong style={{color:"#5b3a8c"}}>MSTF Method:</strong> Every rep takes ~20 seconds (10 up, 10 down). Do 1 set per exercise to complete muscle failure. Rest 30–60 sec between exercises. 2 sessions per week. Alternate Workout A and B. Use resistance bands, dumbbells, or bodyweight — each exercise lists options. Focus on breathing and body awareness throughout.</>:
      <><strong style={{color:"#c4713b"}}>Progression:</strong> Weeks 1–3: 2 rounds. Weeks 4+: 3 rounds. When 15 reps feel easy, slow tempo to 3s down / 1s up before adding weight. Rest 30–45s between exercises, 60–90s between rounds.</>}</div>
    <div style={{padding:"0 1rem"}}>
      {Object.entries(R.days).map(([key,day])=>{const isOpen=openDay===key;
        return(<div key={key} style={{background:"#fff",borderRadius:"12px",marginBottom:".75rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)",overflow:"hidden",border:`1px solid ${isOpen?day.color:"#e0dbd5"}`}}>
          <button onClick={()=>setOpenDay(isOpen?null:key)} style={{width:"100%",padding:"1rem 1.25rem",border:"none",cursor:"pointer",textAlign:"left",background:isOpen?day.bg:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontWeight:700,fontSize:"1rem",color:day.color}}>{day.label} — {day.title}</div>
              <div style={{fontSize:".78rem",color:"#999",marginTop:2}}>{day.exercises.length} exercises</div></div>
            <span style={{fontSize:"1.2rem",color:day.color,transition:"transform .2s",transform:isOpen?"rotate(180deg)":"none"}}>▼</span></button>
          {isOpen&&<div style={{padding:"0 1.25rem 1.25rem"}}>
            <PS title="Warm-Up" items={day.warmup} color={day.color}/>
            <PS title={isMSTF?"Exercises — 1 Set Each to Failure":"Circuit — 2–3 Rounds"} items={day.exercises} color={day.color}/>
            <PS title="Cool-Down" items={day.cooldown} color={day.color}/></div>}
        </div>)})}
      <div style={{background:"#fff",borderRadius:"12px",marginBottom:".75rem",padding:"1rem 1.25rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)",border:"1px solid #e0dbd5"}}>
        <div style={{fontWeight:700,fontSize:"1rem",color:"#4a6fa5"}}>Rest Days</div>
        <div style={{fontSize:".85rem",color:"#777",marginTop:".4rem",lineHeight:1.55}}>
          {isMSTF?"Rest 3–4 days between sessions. Your muscles grow during recovery, not during the workout. Light walking is fine on off days.":
          "Take rest days between training days. 20–30 min walk or gentle stretching."}</div></div>
      <div style={{background:"#fff",borderRadius:"12px",marginBottom:".75rem",padding:"1rem 1.25rem",boxShadow:"0 1px 6px rgba(0,0,0,.06)",border:"1px solid #e0dbd5"}}>
        <div style={{fontWeight:700,fontSize:"1rem",color:"#c4713b"}}>Nutrition for Strength Span</div>
        <div style={{fontSize:".85rem",color:"#777",marginTop:".4rem",lineHeight:1.55}}>
          Aim for 0.7–1g protein per pound of bodyweight daily to support muscle repair and growth. Spread intake across meals — 25–40g per meal is ideal. Good sources: chicken, fish, eggs, Greek yogurt, cottage cheese, whey protein. Without adequate protein, your training can't build the muscle it stimulates. Stay hydrated — dehydration impairs both performance and recovery.</div></div></div>
    <div style={{textAlign:"center",padding:"1rem",color:"#999",fontSize:".78rem",lineHeight:1.7}}>Sharp joint pain → stop & substitute. Consistency beats intensity.</div>
  </div>);
}

function PS({title,items,color}){
  return(<div style={{marginTop:"1rem"}}>
    <div style={{fontWeight:700,fontSize:".75rem",textTransform:"uppercase",letterSpacing:".06em",color:"#999",marginBottom:".5rem",paddingBottom:".3rem",borderBottom:"1px dashed #e0dbd5"}}>{title}</div>
    {items.map((item,i)=>(<div key={i} style={{padding:".5rem 0",borderBottom:i<items.length-1?"1px solid #f0ece7":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",gap:".5rem"}}>
        <span style={{fontWeight:600,fontSize:".92rem"}}>{item.name}</span>
        <span style={{fontSize:".8rem",color:color,fontWeight:700,whiteSpace:"nowrap"}}>{item.target||item.sets}</span></div>
      <div style={{fontSize:".8rem",color:"#777",marginTop:".1rem",lineHeight:1.45}}>{item.note}</div></div>))}</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
