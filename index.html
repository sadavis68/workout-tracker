<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2d5a3d">
<title>Workout Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💪</text></svg>">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body, #root { height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    background: #f5f0eb; color: #1a1a1a; line-height: 1.6; -webkit-font-smoothing: antialiased;
  }
  input[type="number"], input[type="text"], input[type="date"] { -webkit-appearance: none; appearance: none; }
  .bottom-tabs {
    position: fixed; bottom: 0; left: 0; right: 0; display: flex; background: #fff;
    border-top: 1px solid #e0dbd5; z-index: 100; padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .bottom-tabs button {
    flex: 1; padding: 0.6rem 0; border: none; background: none;
    font-size: 0.72rem; font-weight: 600; cursor: pointer; color: #999;
    display: flex; flex-direction: column; align-items: center; gap: 0.15rem;
  }
  .bottom-tabs button.active { color: #2d5a3d; }
  .bottom-tabs button .tab-icon { font-size: 1.2rem; }
  .sync-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 12px;
    font-weight: 600;
  }
  .sync-badge.online { background: rgba(76,175,80,0.2); color: #2e7d32; }
  .sync-badge.offline { background: rgba(255,152,0,0.2); color: #e65100; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyALt3bUT-v5ALd17XoZXTZbdOKE4Q-O7-I",
  authDomain: "workout-journal-2adcb.firebaseapp.com",
  projectId: "workout-journal-2adcb",
  storageBucket: "workout-journal-2adcb.firebasestorage.app",
  messagingSenderId: "682553388016",
  appId: "1:682553388016:web:91116f411f4145da0f8b35"
};

const app = firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.firestore(app);
db.enablePersistence({ synchronizeTabs: true }).catch(() => {});

const WORDS = [
  "IRON","STEEL","PLANK","SQUAT","LUNGE","PRESS","RIDGE","BLAZE","STORM","FORGE",
  "STONE","SWIFT","BRAVO","CEDAR","CLIFF","DELTA","EAGLE","FLINT","GROVE","HAWK",
  "MAPLE","NORTH","OCEAN","PIKE","QUEST","RIVER","SAGE","TRAIL","VIGOR","WOLF",
  "BOLT","CREST","DAWN","EMBER","FROST","GRIT","HIKE","JADE","KEEN","LYNX"
];

function generateSyncCode() {
  const w1 = WORDS[Math.floor(Math.random() * WORDS.length)];
  const w2 = WORDS[Math.floor(Math.random() * WORDS.length)];
  const num = Math.floor(1000 + Math.random() * 9000);
  return `${w1}-${w2}-${num}`;
}

const SYNC_CODE_KEY = "workout-sync-code";
const LOCAL_DATA_KEY = "workout-progress-v3";

const WORKOUT_PLAN = {
  day1: {
    label: "Day 1", title: "Upper Body + Core", color: "#2d5a3d", bg: "#e8f0eb",
    warmup: [
      { name: "Arm Circles", sets: "30 sec each direction", note: "Stand tall, extend arms to sides. Small circles, gradually widening. Reverse after 30s." },
      { name: "Shoulder Pass-Throughs", sets: "10 reps", note: "Hold towel wide. Lift overhead and behind back in slow arc. Keep arms straight." },
      { name: "Cat-Cow", sets: "8 reps", note: "On hands and knees. Inhale: drop belly, lift head (cow). Exhale: round spine, tuck chin (cat)." },
    ],
    exercises: [
      { id: "pushups", name: "Push-Ups", target: "2–3 × 10–15", unit: "reps", note: "Hands shoulder-width, body straight head to heels. Lower chest to floor, push up. Modification: elevate hands on counter." },
      { id: "rows", name: "DB Bent-Over Row", target: "2–3 × 12 ea.", unit: "reps", hasWeight: true, note: "Hinge 45° at hips, soft knees. Pull dumbbell toward hip, squeeze shoulder blade. Start 10–15 lb." },
      { id: "pike", name: "Pike Push-Up / DB Press", target: "2–3 × 8–12", unit: "reps", note: "Downward-dog position, bend elbows, lower head toward floor. Easier: DB overhead press 8–12 lb." },
      { id: "plank", name: "Plank Hold", target: "2–3 × 30–60s", unit: "sec", note: "Forearms on floor, elbows under shoulders. Squeeze glutes, brace core. Start at 30s, build up." },
      { id: "deadbug", name: "Dead Bug", target: "2–3 × 10 ea.", unit: "reps", note: "On back, arms to ceiling, knees 90°. Lower opposite arm/leg slowly. Keep lower back pressed to floor." },
      { id: "curl", name: "DB Bicep Curl", target: "2–3 × 12–15", unit: "reps", hasWeight: true, note: "Dumbbells at sides, palms forward. Curl to shoulders, elbows pinned to ribs. 3s down. 8–15 lb." },
    ],
    cooldown: [
      { name: "Doorway Chest Stretch", sets: "30 sec each side", note: "Forearm on door frame at shoulder height. Step through gently." },
      { name: "Cross-Body Shoulder Stretch", sets: "30 sec each arm", note: "Pull straight arm across chest. Keep shoulder down." },
      { name: "Seated Spinal Twist", sets: "30 sec each side", note: "Cross right foot over left knee, left elbow outside right knee, twist gently." },
      { name: "Child's Pose", sets: "60 sec", note: "Kneel, sit back toward heels, arms forward. Breathe deeply." },
    ],
  },
  day3: {
    label: "Day 3", title: "Lower Body + Core", color: "#2d5a3d", bg: "#e8f0eb",
    warmup: [
      { name: "Bodyweight Squats", sets: "10 slow reps", note: "Feet shoulder-width, toes out. Sit back and down. Focus on control." },
      { name: "Leg Swings", sets: "10 each leg, each direction", note: "Hold wall. Swing forward/back, then side to side. Controlled motion." },
      { name: "Ankle Circles", sets: "10 each direction, each foot", note: "Lift foot, rotate ankle in circles. Important for joint health." },
    ],
    exercises: [
      { id: "goblet", name: "Goblet Squat", target: "2–3 × 12–15", unit: "reps", hasWeight: true, note: "Hold dumbbell at chest (10–25 lb). Squat with chest up, weight in heels. Bodyweight option: arms forward." },
      { id: "lunge", name: "Reverse Lunge", target: "2–3 × 10 ea.", unit: "reps", note: "Step back, lower back knee toward floor. Front knee over ankle. Alternate legs." },
      { id: "bridge", name: "Glute Bridge", target: "2–3 × 15", unit: "reps", note: "On back, knees bent, feet flat. Drive hips up, squeeze glutes, hold 2s. Progression: single-leg." },
      { id: "wallsit", name: "Wall Sit", target: "2–3 × 30–45s", unit: "sec", note: "Back flat on wall, slide to thighs parallel. Knees 90°. Hold and breathe." },
      { id: "calf", name: "Calf Raises", target: "2–3 × 15–20", unit: "reps", note: "Rise on toes, hold 1s at top, lower slowly. Wall for balance. Add dumbbell for challenge." },
      { id: "legraise", name: "Side-Lying Leg Raise", target: "2–3 × 12 ea.", unit: "reps", note: "Lie on side, lift top leg to 45° with control. Hips square. Targets glute medius." },
    ],
    cooldown: [
      { name: "Standing Quad Stretch", sets: "30 sec each leg", note: "Hold wall, grab ankle behind you, pull heel to glute." },
      { name: "Figure-Four Hip Stretch", sets: "30 sec each side", note: "On back, cross ankle over opposite knee, pull thigh to chest." },
      { name: "Downward Dog", sets: "45 sec", note: "Inverted V, press heels toward floor. Pedal feet to stretch calves." },
      { name: "Seated Forward Fold", sets: "45 sec", note: "Legs extended, hinge at hips toward toes. Don't force — breathe into it." },
    ],
  },
  day5: {
    label: "Day 5", title: "Cardio + Flow", color: "#c4713b", bg: "#fdf3ec",
    warmup: [
      { name: "March in Place", sets: "60 sec", note: "Knees to hip height, pump arms. Start easy, increase pace." },
      { name: "Arm Circles + Torso Twists", sets: "30 sec each", note: "Quick circles, then hands on hips and rotate torso." },
    ],
    exercises: [
      { id: "walk", name: "Brisk Walk / Jog", target: "45s on / 15s rest", unit: "rounds", note: "Moderate pace — can talk in short sentences. Pump arms." },
      { id: "stepup", name: "Step-Ups", target: "45s on / 15s rest", unit: "rounds", note: "Sturdy step 6–12 inches. Alternate leading leg each round. Chest up." },
      { id: "jacks", name: "Jumping Jacks", target: "45s on / 15s rest", unit: "rounds", note: "Low-impact: stepping jacks or seal jacks (arms clap in front)." },
      { id: "climbers", name: "Mountain Climbers", target: "45s on / 15s rest", unit: "rounds", note: "Push-up position, alternate knees to chest. ~1/sec. Hands on counter for easier." },
      { id: "highknees", name: "High Knees", target: "45s on / 15s rest", unit: "rounds", note: "March with high knees. Arms opposite legs. Height over speed." },
      { id: "flow", name: "Flexibility Flow", target: "12–15 min", unit: "min", note: "Sun salutations → Warrior I & II → Pigeon → Spinal twist → Hamstring stretch → Child's pose." },
    ],
    cooldown: [
      { name: "Pigeon Pose", sets: "45 sec each side", note: "Slide knee forward, extend opposite leg back. Deep hip stretch." },
      { name: "Supine Hamstring Stretch", sets: "30 sec each leg", note: "On back, lift leg and hold behind thigh. Use towel if needed." },
      { name: "Child's Pose", sets: "60 sec", note: "Final resting position. Breathe deeply, let everything relax." },
    ],
  },
};

const inputStyle = {
  width: "100%", padding: "0.45rem 0.5rem", border: "1.5px solid #e0dbd5",
  borderRadius: "8px", fontSize: "0.95rem", fontFamily: "inherit",
  outline: "none", marginTop: "0.15rem", background: "#fafaf8",
};

function SyncCodeScreen({ onCodeSet }) {
  const [mode, setMode] = useState(null);
  const [inputCode, setInputCode] = useState("");
  const [error, setError] = useState("");

  const createNew = () => {
    const code = generateSyncCode();
    localStorage.setItem(SYNC_CODE_KEY, code);
    onCodeSet(code);
  };

  const joinExisting = async () => {
    const code = inputCode.trim().toUpperCase();
    if (!code || code.split("-").length < 2) {
      setError("Enter a valid sync code (e.g. IRON-WOLF-4821)");
      return;
    }
    try {
      const doc = await db.collection("trackers").doc(code).get();
      if (!doc.exists) {
        setError("No tracker found with that code. Check the code and try again.");
        return;
      }
      localStorage.setItem(SYNC_CODE_KEY, code);
      onCodeSet(code);
    } catch (e) {
      setError("Connection error. Check your internet and try again.");
    }
  };

  return (
    <div style={{ padding: "2rem 1.5rem", maxWidth: 440, margin: "0 auto" }}>
      <div style={{ textAlign: "center", marginBottom: "2rem" }}>
        <div style={{ fontSize: "3rem" }}>💪</div>
        <h1 style={{ fontSize: "1.5rem", color: "#2d5a3d", margin: "0.5rem 0 0.25rem" }}>Workout Tracker</h1>
        <p style={{ color: "#999", fontSize: "0.88rem" }}>Syncs across all your devices</p>
      </div>
      {mode === null && (
        <div style={{ display: "flex", flexDirection: "column", gap: "0.75rem" }}>
          <button onClick={createNew} style={{ padding: "1.1rem", border: "none", borderRadius: "12px", background: "#2d5a3d", color: "#fff", fontSize: "1rem", fontWeight: 700, cursor: "pointer" }}>Start Fresh</button>
          <button onClick={() => setMode("existing")} style={{ padding: "1.1rem", border: "2px solid #2d5a3d", borderRadius: "12px", background: "#fff", color: "#2d5a3d", fontSize: "1rem", fontWeight: 700, cursor: "pointer" }}>I Have a Sync Code</button>
        </div>
      )}
      {mode === "existing" && (
        <div style={{ background: "#fff", borderRadius: "12px", padding: "1.25rem", boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
          <div style={{ fontWeight: 700, marginBottom: "0.75rem" }}>Enter your sync code</div>
          <input type="text" value={inputCode}
            onChange={(e) => { setInputCode(e.target.value.toUpperCase()); setError(""); }}
            placeholder="IRON-WOLF-4821"
            style={{ ...inputStyle, fontSize: "1.1rem", textAlign: "center", letterSpacing: "0.05em", padding: "0.7rem", textTransform: "uppercase" }}
            autoFocus autoCapitalize="characters" autoCorrect="off" />
          {error && <div style={{ color: "#c0392b", fontSize: "0.82rem", marginTop: "0.5rem" }}>{error}</div>}
          <div style={{ display: "flex", gap: "0.5rem", marginTop: "1rem" }}>
            <button onClick={() => setMode(null)} style={{ flex: 1, padding: "0.7rem", border: "1px solid #ddd", borderRadius: "8px", background: "#fff", cursor: "pointer", fontWeight: 600, fontSize: "0.9rem" }}>Back</button>
            <button onClick={joinExisting} style={{ flex: 2, padding: "0.7rem", border: "none", borderRadius: "8px", background: "#2d5a3d", color: "#fff", cursor: "pointer", fontWeight: 600, fontSize: "0.9rem" }}>Connect</button>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [syncCode, setSyncCode] = useState(() => localStorage.getItem(SYNC_CODE_KEY));
  const [page, setPage] = useState("tracker");

  if (!syncCode) return <SyncCodeScreen onCodeSet={setSyncCode} />;

  return (
    <div style={{ paddingBottom: "4rem" }}>
      {page === "tracker" ? <Tracker syncCode={syncCode} setSyncCode={setSyncCode} /> : <PlanView />}
      <div className="bottom-tabs">
        <button className={page === "tracker" ? "active" : ""} onClick={() => setPage("tracker")}>
          <span className="tab-icon">📝</span>Tracker
        </button>
        <button className={page === "plan" ? "active" : ""} onClick={() => setPage("plan")}>
          <span className="tab-icon">📋</span>Exercises
        </button>
      </div>
    </div>
  );
}

function Tracker({ syncCode, setSyncCode }) {
  const [data, setData] = useState({ startDate: new Date().toISOString().split("T")[0], weeks: {} });
  const [currentWeek, setCurrentWeek] = useState(1);
  const [activeDay, setActiveDay] = useState("day1");
  const [view, setView] = useState("log");
  const [synced, setSynced] = useState(false);
  const [showSyncInfo, setShowSyncInfo] = useState(false);
  const saveTimeout = useRef(null);

  useEffect(() => {
    if (!syncCode) return;
    const unsub = db.collection("trackers").doc(syncCode).onSnapshot((doc) => {
      if (doc.exists) {
        const remote = doc.data();
        setData(remote);
        if (remote.startDate) {
          const start = new Date(remote.startDate);
          const now = new Date();
          const diff = Math.floor((now - start) / (7 * 24 * 60 * 60 * 1000));
          setCurrentWeek(Math.max(1, diff + 1));
        }
        setSynced(true);
      } else {
        const initial = { startDate: new Date().toISOString().split("T")[0], weeks: {} };
        db.collection("trackers").doc(syncCode).set(initial);
        setData(initial);
        setSynced(true);
      }
    }, () => setSynced(false));
    return () => unsub();
  }, [syncCode]);

  const save = useCallback((newData) => {
    setData(newData);
    try { localStorage.setItem(LOCAL_DATA_KEY, JSON.stringify(newData)); } catch {}
    if (saveTimeout.current) clearTimeout(saveTimeout.current);
    saveTimeout.current = setTimeout(() => {
      db.collection("trackers").doc(syncCode).set(newData).catch(() => {});
    }, 500);
  }, [syncCode]);

  const getDayDate = (week, day) => data?.weeks?.[`w${week}`]?.[day]?._date || "";
  const setDayDate = (dateVal) => {
    const nd = JSON.parse(JSON.stringify(data));
    const wk = `w${currentWeek}`;
    if (!nd.weeks[wk]) nd.weeks[wk] = {};
    if (!nd.weeks[wk][activeDay]) nd.weeks[wk][activeDay] = {};
    nd.weeks[wk][activeDay]._date = dateVal;
    save(nd);
  };
  const getEntry = (week, day, exId) => data?.weeks?.[`w${week}`]?.[day]?.[exId] || {};
  const updateEntry = (exId, field, value) => {
    const nd = JSON.parse(JSON.stringify(data));
    const wk = `w${currentWeek}`;
    if (!nd.weeks[wk]) nd.weeks[wk] = {};
    if (!nd.weeks[wk][activeDay]) nd.weeks[wk][activeDay] = {};
    if (!nd.weeks[wk][activeDay][exId]) nd.weeks[wk][activeDay][exId] = {};
    nd.weeks[wk][activeDay][exId][field] = value;
    save(nd);
  };
  const isDayComplete = (week, day) => {
    const dd = data?.weeks?.[`w${week}`]?.[day];
    if (!dd) return false;
    return WORKOUT_PLAN[day].exercises.every((ex) => dd[ex.id]?.done);
  };
  const getWeekCompletion = (week) => ["day1","day3","day5"].filter(d => isDayComplete(week, d)).length;
  const resetData = () => {
    if (confirm("This will erase ALL your progress across all devices. Are you sure?")) {
      const initial = { startDate: new Date().toISOString().split("T")[0], weeks: {} };
      save(initial);
      setCurrentWeek(1);
    }
  };
  const disconnect = () => {
    if (confirm("This will disconnect this device. Your data stays in the cloud. You can reconnect with your sync code.")) {
      localStorage.removeItem(SYNC_CODE_KEY);
      localStorage.removeItem(LOCAL_DATA_KEY);
      setSyncCode(null);
    }
  };

  const plan = WORKOUT_PLAN[activeDay];
  const completedThisWeek = getWeekCompletion(currentWeek);
  const pastWeeks = [];
  for (let w = currentWeek - 1; w >= 1; w--) {
    if (data.weeks[`w${w}`]) pastWeeks.push(w);
  }

  return (
    <div>
      <div style={{ background: "#2d5a3d", color: "#fff", padding: "1.25rem 1rem 1rem", textAlign: "center" }}>
        <div style={{ display: "flex", justifyContent: "center", alignItems: "center", gap: "0.5rem" }}>
          <span style={{ fontSize: "1.35rem", fontWeight: 700 }}>Workout Tracker</span>
          <span className={`sync-badge ${synced ? "online" : "offline"}`}>
            <span style={{ width: 6, height: 6, borderRadius: "50%", background: synced ? "#2e7d32" : "#e65100", animation: synced ? "none" : "pulse 1.5s infinite" }}></span>
            {synced ? "synced" : "offline"}
          </span>
        </div>
        <div style={{ fontSize: "0.82rem", opacity: 0.8, marginTop: "0.2rem" }}>
          Week {currentWeek} • {completedThisWeek}/3 sessions
          <span onClick={() => setShowSyncInfo(!showSyncInfo)} style={{ marginLeft: 8, cursor: "pointer", textDecoration: "underline", opacity: 0.7 }}>sync code</span>
        </div>
      </div>

      {showSyncInfo && (
        <div style={{ background: "#fff", padding: "1rem", borderBottom: "1px solid #e0dbd5", textAlign: "center" }}>
          <div style={{ fontSize: "0.78rem", color: "#999", marginBottom: "0.3rem" }}>Your sync code (use on other devices):</div>
          <div style={{ fontSize: "1.3rem", fontWeight: 700, letterSpacing: "0.08em", color: "#2d5a3d", fontFamily: "monospace" }}>{syncCode}</div>
          <button onClick={disconnect} style={{ marginTop: "0.6rem", border: "1px solid #ddd", background: "none", color: "#999", padding: "0.3rem 1rem", borderRadius: "6px", fontSize: "0.75rem", cursor: "pointer" }}>
            Disconnect this device
          </button>
        </div>
      )}

      <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: "1rem", padding: "0.75rem 1rem", background: "#fff", borderBottom: "1px solid #e0dbd5" }}>
        <button onClick={() => setCurrentWeek(Math.max(1, currentWeek - 1))} disabled={currentWeek <= 1}
          style={{ border: "none", background: "none", fontSize: "1.2rem", cursor: currentWeek > 1 ? "pointer" : "default", opacity: currentWeek > 1 ? 1 : 0.3, padding: "0.25rem 0.5rem" }}>◀</button>
        <span style={{ fontWeight: 600, fontSize: "0.95rem" }}>Week {currentWeek}</span>
        <button onClick={() => setCurrentWeek(currentWeek + 1)}
          style={{ border: "none", background: "none", fontSize: "1.2rem", cursor: "pointer", padding: "0.25rem 0.5rem" }}>▶</button>
      </div>

      <div style={{ display: "flex", gap: "0.5rem", padding: "0.75rem 1rem" }}>
        {["log", "history"].map((v) => (
          <button key={v} onClick={() => setView(v)}
            style={{
              flex: 1, padding: "0.5rem", border: "none", borderRadius: "8px", fontWeight: 600, fontSize: "0.85rem", cursor: "pointer",
              background: view === v ? "#2d5a3d" : "#fff", color: view === v ? "#fff" : "#2d5a3d",
              boxShadow: view === v ? "none" : "0 1px 4px rgba(0,0,0,0.08)",
            }}>
            {v === "log" ? "📝 Log Workout" : "📊 History"}
          </button>
        ))}
      </div>

      {view === "log" ? (
        <>
          <div style={{ display: "flex", gap: "0.4rem", padding: "0 1rem 0.75rem" }}>
            {Object.entries(WORKOUT_PLAN).map(([key, day]) => {
              const complete = isDayComplete(currentWeek, key);
              const dayDate = getDayDate(currentWeek, key);
              return (
                <button key={key} onClick={() => setActiveDay(key)}
                  style={{
                    flex: 1, padding: "0.6rem 0.25rem", border: activeDay === key ? `2px solid ${day.color}` : "2px solid transparent",
                    borderRadius: "10px", cursor: "pointer", fontSize: "0.75rem", fontWeight: 600, textAlign: "center",
                    background: activeDay === key ? day.bg : "#fff", color: day.color,
                    boxShadow: "0 1px 4px rgba(0,0,0,0.06)", position: "relative",
                  }}>
                  {complete && <span style={{ position: "absolute", top: 3, right: 6, fontSize: "0.7rem" }}>✅</span>}
                  <div>{day.label}</div>
                  <div style={{ fontSize: "0.65rem", fontWeight: 400, opacity: 0.75, marginTop: 1 }}>{day.title}</div>
                  {dayDate && <div style={{ fontSize: "0.6rem", fontWeight: 400, opacity: 0.55, marginTop: 1 }}>{new Date(dayDate + "T12:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" })}</div>}
                </button>
              );
            })}
          </div>

          <div style={{ padding: "0 1rem 0.75rem" }}>
            <div style={{ background: "#fff", borderRadius: "10px", padding: "0.65rem 1rem", boxShadow: "0 1px 4px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: "0.6rem" }}>
              <span style={{ fontSize: "0.82rem", fontWeight: 600, color: "#666", whiteSpace: "nowrap" }}>📅 Workout date:</span>
              <input type="date"
                value={getDayDate(currentWeek, activeDay) || new Date().toISOString().split("T")[0]}
                onChange={(e) => setDayDate(e.target.value)}
                style={{ flex: 1, padding: "0.4rem 0.5rem", border: "1.5px solid #e0dbd5", borderRadius: "8px", fontSize: "0.9rem", fontFamily: "inherit", background: "#fafaf8", outline: "none" }}
              />
            </div>
          </div>

          <div style={{ padding: "0 1rem" }}>
            {plan.exercises.map((ex) => {
              const entry = getEntry(currentWeek, activeDay, ex.id);
              return (
                <div key={ex.id} style={{
                  background: "#fff", borderRadius: "12px", padding: "0.9rem 1rem", marginBottom: "0.65rem",
                  boxShadow: "0 1px 6px rgba(0,0,0,0.06)", borderLeft: `4px solid ${entry.done ? "#4caf50" : plan.color}`,
                  opacity: entry.done ? 0.85 : 1,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.5rem" }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: "0.95rem" }}>{ex.name}</div>
                      <div style={{ fontSize: "0.78rem", color: "#888", marginTop: 1 }}>Target: {ex.target}</div>
                    </div>
                    <button onClick={() => updateEntry(ex.id, "done", !entry.done)}
                      style={{
                        border: `2px solid ${entry.done ? "#4caf50" : "#ccc"}`, background: entry.done ? "#4caf50" : "#fff",
                        borderRadius: "8px", width: 36, height: 36, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center",
                        fontSize: "1.1rem", color: entry.done ? "#fff" : "#ccc", flexShrink: 0,
                      }}>✓</button>
                  </div>
                  <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
                    <div style={{ flex: 1, minWidth: "60px" }}>
                      <label style={{ fontSize: "0.68rem", color: "#999", fontWeight: 600, textTransform: "uppercase" }}>Sets</label>
                      <input type="number" inputMode="numeric" value={entry.sets || ""}
                        onChange={(e) => updateEntry(ex.id, "sets", e.target.value)} placeholder="—" style={inputStyle} />
                    </div>
                    <div style={{ flex: 1, minWidth: "60px" }}>
                      <label style={{ fontSize: "0.68rem", color: "#999", fontWeight: 600, textTransform: "uppercase" }}>
                        {ex.unit === "sec" ? "Seconds" : ex.unit === "min" ? "Minutes" : ex.unit === "rounds" ? "Rounds" : "Reps"}
                      </label>
                      <input type="number" inputMode="numeric" value={entry.reps || ""}
                        onChange={(e) => updateEntry(ex.id, "reps", e.target.value)} placeholder="—" style={inputStyle} />
                    </div>
                    {ex.hasWeight && (
                      <div style={{ flex: 1, minWidth: "60px" }}>
                        <label style={{ fontSize: "0.68rem", color: "#999", fontWeight: 600, textTransform: "uppercase" }}>Lbs</label>
                        <input type="number" inputMode="decimal" value={entry.weight || ""}
                          onChange={(e) => updateEntry(ex.id, "weight", e.target.value)} placeholder="—" style={inputStyle} />
                      </div>
                    )}
                  </div>
                  <div style={{ marginTop: "0.4rem" }}>
                    <label style={{ fontSize: "0.68rem", color: "#999", fontWeight: 600, textTransform: "uppercase" }}>Notes</label>
                    <input type="text" value={entry.notes || ""}
                      onChange={(e) => updateEntry(ex.id, "notes", e.target.value)}
                      placeholder="How did it feel? Modifications?" style={{ ...inputStyle, fontSize: "0.82rem" }} />
                  </div>
                </div>
              );
            })}
          </div>
        </>
      ) : (
        <div style={{ padding: "0 1rem" }}>
          <WeekSummary week={currentWeek} data={data} label="This Week" />
          {pastWeeks.length > 0 ? pastWeeks.map((w) => <WeekSummary key={w} week={w} data={data} label={`Week ${w}`} />) : (
            <div style={{ textAlign: "center", color: "#999", padding: "2rem 1rem", fontSize: "0.9rem" }}>Past weeks will appear here as you progress.</div>
          )}
          <button onClick={resetData} style={{ display: "block", margin: "2rem auto 0", background: "none", border: "1px solid #ddd", color: "#c0392b", padding: "0.6rem 1.5rem", borderRadius: "8px", fontSize: "0.82rem", cursor: "pointer" }}>
            Reset All Progress
          </button>
        </div>
      )}
    </div>
  );
}

function WeekSummary({ week, data, label }) {
  const wk = `w${week}`;
  const weekData = data?.weeks?.[wk];
  if (!weekData && label !== "This Week") return null;
  return (
    <div style={{ background: "#fff", borderRadius: "12px", padding: "1rem", marginBottom: "0.75rem", boxShadow: "0 1px 6px rgba(0,0,0,0.06)" }}>
      <div style={{ fontWeight: 700, fontSize: "1rem", marginBottom: "0.6rem", color: "#2d5a3d" }}>{label}</div>
      {Object.entries(WORKOUT_PLAN).map(([dayKey, day]) => {
        const dayData = weekData?.[dayKey];
        const exercises = day.exercises;
        const logged = exercises.filter((ex) => dayData?.[ex.id]?.done).length;
        const total = exercises.length;
        return (
          <div key={dayKey} style={{ marginBottom: "0.6rem", paddingBottom: "0.6rem", borderBottom: "1px solid #f0ece7" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "0.3rem" }}>
              <div>
                <span style={{ fontWeight: 600, fontSize: "0.88rem", color: day.color }}>{day.label}: {day.title}</span>
                {dayData?._date && <span style={{ fontSize: "0.72rem", color: "#aaa", marginLeft: "0.4rem" }}>{new Date(dayData._date + "T12:00:00").toLocaleDateString(undefined, { month: "short", day: "numeric" })}</span>}
              </div>
              <span style={{ fontSize: "0.78rem", color: logged === total ? "#4caf50" : "#999" }}>{logged}/{total} {logged === total ? "✅" : ""}</span>
            </div>
            {dayData && (
              <div style={{ fontSize: "0.78rem", color: "#777" }}>
                {exercises.map((ex) => {
                  const e = dayData[ex.id];
                  if (!e?.done) return null;
                  return (
                    <div key={ex.id} style={{ marginLeft: "0.5rem", marginBottom: "0.15rem" }}>
                      <span style={{ fontWeight: 500 }}>{ex.name}:</span>{" "}
                      {e.sets && `${e.sets}×`}{e.reps || "—"}{e.weight ? ` @ ${e.weight}lb` : ""}
                      {e.notes && <span style={{ color: "#aaa" }}> — {e.notes}</span>}
                    </div>
                  );
                })}
              </div>
            )}
            {!dayData && <div style={{ fontSize: "0.78rem", color: "#ccc", marginLeft: "0.5rem" }}>Not logged yet</div>}
          </div>
        );
      })}
    </div>
  );
}

function PlanView() {
  const [openDay, setOpenDay] = useState(null);
  return (
    <div>
      <div style={{ background: "#2d5a3d", color: "#fff", padding: "1.25rem 1rem 1rem", textAlign: "center" }}>
        <div style={{ fontSize: "1.35rem", fontWeight: 700 }}>Exercise Guide</div>
        <div style={{ fontSize: "0.82rem", opacity: 0.8, marginTop: "0.2rem" }}>Tap a day for full instructions</div>
      </div>
      <div style={{ margin: "1rem", padding: "0.85rem 1rem", background: "#fdf3ec", borderRadius: "10px", fontSize: "0.82rem", lineHeight: 1.55 }}>
        <strong style={{ color: "#c4713b" }}>Progression:</strong> Weeks 1–3: 2 rounds. Weeks 4+: 3 rounds. When 15 reps feel easy, slow tempo to 3s down / 1s up before adding weight. Rest 30–45s between exercises, 60–90s between rounds.
      </div>
      <div style={{ padding: "0 1rem" }}>
        {Object.entries(WORKOUT_PLAN).map(([key, day]) => {
          const isOpen = openDay === key;
          return (
            <div key={key} style={{ background: "#fff", borderRadius: "12px", marginBottom: "0.75rem", boxShadow: "0 1px 6px rgba(0,0,0,0.06)", overflow: "hidden", border: `1px solid ${isOpen ? day.color : "#e0dbd5"}` }}>
              <button onClick={() => setOpenDay(isOpen ? null : key)}
                style={{ width: "100%", padding: "1rem 1.25rem", border: "none", cursor: "pointer", textAlign: "left", background: isOpen ? day.bg : "#fff", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: "1rem", color: day.color }}>{day.label} — {day.title}</div>
                  <div style={{ fontSize: "0.78rem", color: "#999", marginTop: 2 }}>{day.exercises.length} exercises + warm-up & cool-down</div>
                </div>
                <span style={{ fontSize: "1.2rem", color: day.color, transition: "transform 0.2s", transform: isOpen ? "rotate(180deg)" : "none" }}>▼</span>
              </button>
              {isOpen && (
                <div style={{ padding: "0 1.25rem 1.25rem" }}>
                  <PhaseSection title="Warm-Up" items={day.warmup} color={day.color} />
                  <PhaseSection title="Circuit — 2–3 Rounds" items={day.exercises} color={day.color} />
                  <PhaseSection title="Cool-Down Stretches" items={day.cooldown} color={day.color} />
                </div>
              )}
            </div>
          );
        })}
        <div style={{ background: "#fff", borderRadius: "12px", marginBottom: "0.75rem", padding: "1rem 1.25rem", boxShadow: "0 1px 6px rgba(0,0,0,0.06)", border: "1px solid #e0dbd5" }}>
          <div style={{ fontWeight: 700, fontSize: "1rem", color: "#4a6fa5" }}>Rest Days</div>
          <div style={{ fontSize: "0.85rem", color: "#777", marginTop: "0.4rem", lineHeight: 1.55 }}>
            Take rest days between training days. 20–30 min easy walk or 10 min gentle stretching. This is when your body builds strength.
          </div>
        </div>
      </div>
      <div style={{ textAlign: "center", padding: "1rem", color: "#999", fontSize: "0.78rem", lineHeight: 1.7 }}>
        Sharp joint pain → stop & substitute. Muscle soreness 24–48hr later is normal. Stay hydrated. Consistency beats intensity.
      </div>
    </div>
  );
}

function PhaseSection({ title, items, color }) {
  return (
    <div style={{ marginTop: "1rem" }}>
      <div style={{ fontWeight: 700, fontSize: "0.75rem", textTransform: "uppercase", letterSpacing: "0.06em", color: "#999", marginBottom: "0.5rem", paddingBottom: "0.3rem", borderBottom: "1px dashed #e0dbd5" }}>{title}</div>
      {items.map((item, i) => (
        <div key={i} style={{ padding: "0.5rem 0", borderBottom: i < items.length - 1 ? "1px solid #f0ece7" : "none" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", gap: "0.5rem" }}>
            <span style={{ fontWeight: 600, fontSize: "0.92rem" }}>{item.name}</span>
            <span style={{ fontSize: "0.8rem", color: color, fontWeight: 700, whiteSpace: "nowrap" }}>{item.target || item.sets}</span>
          </div>
          <div style={{ fontSize: "0.8rem", color: "#777", marginTop: "0.1rem", lineHeight: 1.45 }}>{item.note}</div>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
